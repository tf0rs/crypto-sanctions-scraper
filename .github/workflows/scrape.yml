name: scrape-crypto-sanctions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "app/uv.lock"
      - run: uv sync --locked
        working-directory: app
      - run: uv run python scraper.py | tee ../run_output.txt
        working-directory: app
      - name: Commit updated data
        # Sources run independently now (see scraper.py) — one failing
        # shouldn't discard data the others successfully collected. The
        # scrape step still exits non-zero on any source failure (GH
        # Actions' default bash has pipefail on, so the `tee` doesn't mask
        # it), which is what makes the run show up red in the Actions tab.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sanctions.db
          if ! git diff --cached --quiet; then
            { echo "Update sanctions data $(date -u +%Y-%m-%dT%H:%M:%SZ)"; echo; cat run_output.txt; } > commit_message.txt
            git commit -F commit_message.txt
            git push
          fi
